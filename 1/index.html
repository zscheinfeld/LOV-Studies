<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>

        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <nav>
            <div class="item">About</div>
            <div class="item">SEARCH</div>
        </nav>

        <div class="intro">
        <div class="title">
            LIBRARY OF <br> VOICES
        </div>
        <div class="label">
            Welcome to the digital audiovisual archives of the Woodberry Poetry Room at Harvard University.
        </div>
        </div>

        <div class="player">
            <div id="my-p5-container">
                <!-- The p5.js canvas will be placed here -->
                <div id="stroke-controls">
                    <div class="sc-header">
                        <span>Stroke Settings</span>
                        <button id="sc-toggle" aria-label="Toggle panel"><span class="material-icons">tune</span></button>
                    </div>
                    <div class="sc-body">
                        <div class="sc-row">
                            <label for="ctrl-layout-mode">Layout</label>
                            <select id="ctrl-layout-mode">
                                <option value="random" selected>Random</option>
                                <option value="linear">Linear</option>
                                <option value="circular">Circular</option>
                            </select>
                        </div>
                        <div class="sc-divider"></div>
                        <div class="sc-row">
                            <label for="ctrl-texture-type">Texture</label>
                            <select id="ctrl-texture-type">
                                <option value="bristle" selected>Bristle</option>
                                <option value="smooth">Smooth</option>
                                <option value="rough">Rough</option>
                                <option value="dotted">Dotted</option>
                            </select>
                        </div>
                        <div class="sc-row">
                            <label for="ctrl-width">Width</label>
                            <input type="range" id="ctrl-width" min="0.2" max="10" step="0.1" value="1">
                            <span class="sc-val" id="val-width">1.0x</span>
                        </div>
                        <div class="sc-row">
                            <label for="ctrl-opacity">Opacity</label>
                            <input type="range" id="ctrl-opacity" min="0.2" max="1.5" step="0.05" value="1">
                            <span class="sc-val" id="val-opacity">1.0x</span>
                        </div>
                        <div class="sc-row">
                            <label for="ctrl-smoothness">Smoothness</label>
                            <input type="range" id="ctrl-smoothness" min="1" max="10" step="0.5" value="5">
                            <span class="sc-val" id="val-smoothness">5</span>
                        </div>
                        <div class="sc-row" id="row-wander">
                            <label for="ctrl-wander">Wander</label>
                            <input type="range" id="ctrl-wander" min="0.5" max="8" step="0.5" value="3">
                            <span class="sc-val" id="val-wander">3.0</span>
                        </div>
                        <div class="sc-row" id="row-spacing" style="display:none;">
                            <label for="ctrl-spacing">Spacing</label>
                            <input type="range" id="ctrl-spacing" min="5" max="100" step="1" value="30">
                            <span class="sc-val" id="val-spacing">30</span>
                        </div>
                        <div class="sc-row" id="row-spiral-speed" style="display:none;">
                            <label for="ctrl-spiral-speed">Speed</label>
                            <input type="range" id="ctrl-spiral-speed" min="0.01" max="0.15" step="0.005" value="0.06">
                            <span class="sc-val" id="val-spiral-speed">0.060</span>
                        </div>
                        <div class="sc-row">
                            <label for="ctrl-bristles">Bristle Count</label>
                            <input type="range" id="ctrl-bristles" min="1" max="15" step="2" value="3">
                            <span class="sc-val" id="val-bristles">3</span>
                        </div>
                        <div class="sc-row">
                            <label for="ctrl-spread">Bristle Spread</label>
                            <input type="range" id="ctrl-spread" min="0.5" max="10" step="0.25" value="1.5">
                            <span class="sc-val" id="val-spread">1.5</span>
                        </div>
                        <div class="sc-divider"></div>
                        <div class="sc-row">
                            <label for="ctrl-bg-color">Background</label>
                            <input type="color" id="ctrl-bg-color" value="#ffffff">
                        </div>
                        <div class="sc-row sc-row-colors">
                            <label>Stroke Colors</label>
                            <div id="stroke-color-list">
                                <input type="color" class="stroke-color-swatch" value="#000000">
                            </div>
                            <button id="add-stroke-color" aria-label="Add color"><span class="material-icons">add</span></button>
                        </div>
                    </div>
                </div>
                <div id="time-scrubber">
                    <span id="scrubber-current">0:00</span>
                    <input type="range" id="scrubber-range" min="0" max="1" step="0.01" value="0">
                    <span id="scrubber-duration">0:00</span>
                </div>
                <div class="controls-overlay">
                    <button id="fullscreen-toggle" aria-label="Toggle fullscreen">
                        <span class="material-icons">fullscreen</span>
                    </button>
                </div>
            </div>
            <button id="play">Play</button>
            <div id="audio-data-panel">
                <div class="audio-datum">
                    <span class="audio-label">Amplitude</span>
                    <span class="audio-value" id="data-amplitude">0.000</span>
                    <div class="audio-bar"><div class="audio-bar-fill" id="bar-amplitude"></div></div>
                </div>
                <div class="audio-datum">
                    <span class="audio-label">Volume (dB)</span>
                    <span class="audio-value" id="data-volume">-Inf dB</span>
                    <div class="audio-bar"><div class="audio-bar-fill" id="bar-volume"></div></div>
                </div>
                <div class="audio-datum">
                    <span class="audio-label">Dominant Freq</span>
                    <span class="audio-value" id="data-frequency">0 Hz</span>
                    <div class="audio-bar"><div class="audio-bar-fill" id="bar-frequency"></div></div>
                </div>
                <div class="audio-datum">
                    <span class="audio-label">Spectral Centroid</span>
                    <span class="audio-value" id="data-centroid">0 Hz</span>
                    <div class="audio-bar"><div class="audio-bar-fill" id="bar-centroid"></div></div>
                </div>
                <div class="audio-datum">
                    <span class="audio-label">Bass Energy</span>
                    <span class="audio-value" id="data-bass">0.000</span>
                    <div class="audio-bar"><div class="audio-bar-fill" id="bar-bass"></div></div>
                </div>
                <div class="audio-datum">
                    <span class="audio-label">Speech</span>
                    <span class="audio-value" id="data-speech">Silent</span>
                </div>
            </div>
        </div>
        
        <script src="script.js" async defer></script>
    </body>
</html>
